server:
  address: 0.0.0.0
  port: 8080
  forward-headers-strategy: framework
  servlet:
    context-path: /api

spring:
  application:
    name: deedm-backend

  # Database configuration
  datasource:
    url: jdbc:h2:file:/opt/deedm/db/deedm_db;DB_CLOSE_DELAY=-1 # 数据持久化到磁盘
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2 Console configuration
  h2:
    console:
      enabled: false
      path: /h2-console

# Logging configuration
logging:
  file:
    name: ./logs/deedm-backend.log
  level:
    com.deedm: INFO
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

audit:
  enabled: true
  abuse:
    enabled: true
    threshold-per-minute: 120
  retention:
    days: 180
    cron: "0 30 2 * * *"

# Application configuration
deedm:
  # CORS configuration
  cors:
    allowed-origins: "127.0.0.1"
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"

  # File upload configuration
  upload:
    max-size: 10MB
    allowed-types: .txt,.json

  # Cache configuration
  cache:
    ttl: 3600 # seconds

# OpenAPI configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
