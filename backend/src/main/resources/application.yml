server:
  address: 127.0.0.1
  port: 8080
  forward-headers-strategy: framework
  servlet:
    context-path: /api

spring:
  application:
    name: deedm-backend

  # Database configuration
  datasource:
  # 单机部署使用 H2 文件模式，数据库文件位于 /opt/deedm/data/deedm.mv.db
  # 当前架构是“多个客户端 -> 一个 Spring Boot 进程 -> 一个 H2 文件库”
  # 因此不需要 AUTO_SERVER=TRUE；它主要用于多个独立进程同时打开同一个 H2 文件
    url: jdbc:h2:file:/opt/deedm/data/deedm
    driver-class-name: org.h2.Driver
    username: sa
    password: "ENC(GC1RBSC9zFRC5Opq4bXAVRRN5P821xdzFpUcQEHFlhk=)"

  # JPA configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # H2 Console configuration,close console
  h2:
    console:
      enabled: false
      path: /h2-console

jasypt:
  encryptor:
    # Align with ~/encrypt/src/main/java/com/example/CipherGeneratorApp.java.
    # The current datasource password ciphertext uses the legacy
    # PBEWithMD5AndDES format with base64 output and no IV.
    algorithm: PBEWithMD5AndDES
    iv-generator-classname: org.jasypt.iv.NoIvGenerator
    string-output-type: base64

# Logging configuration,DEBUG->INFO
logging:
  file:
    name: ./logs/deedm-backend.log
  level:
    com.deedm: INFO
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

audit:
  enabled: true
  abuse:
    enabled: true
    threshold-per-minute: 120
  retention:
    days: 180
    cron: "0 30 2 * * *"

# Application configuration
deedm:
  # CORS configuration
  cors:
    allowed-origins: "127.0.0.1"
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"

  # File upload configuration
  upload:
    max-size: 10MB
    allowed-types: .txt,.json

  # Cache configuration
  cache:
    ttl: 3600 # seconds

# OpenAPI configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
